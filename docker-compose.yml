version: '3.8'

services:
  # ============================================================
  # FRONTEND — React + Vite
  # ============================================================
  webapp:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

  # ============================================================
  # BACKEND — Python FastAPI (unified: auth + CRUD + prices)
  # ============================================================
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - VNSTOCK_API_ENABLED=${VNSTOCK_API_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json