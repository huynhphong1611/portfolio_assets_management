version: '3.8'

services:
  # ============================================================
  # FRONTEND — React + Vite
  # ============================================================
  webapp:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api

  # ============================================================
  # API — Python FastAPI + vnstock
  # ============================================================
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - VNSTOCK_API_ENABLED=${VNSTOCK_API_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}